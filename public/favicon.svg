<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- Japanese postal mark (〒) -->
  <g fill="white">
    <!-- Horizontal top line -->
    <rect x="25" y="25" width="50" height="6" rx="3"/>
    
    <!-- Vertical line -->
    <rect x="47" y="25" width="6" height="50" rx="3"/>
    
    <!-- Left diagonal -->
    <rect x="35" y="35" width="6" height="25" rx="3" transform="rotate(-15 38 47.5)"/>
    
    <!-- Right diagonal -->
    <rect x="59" y="35" width="6" height="25" rx="3" transform="rotate(15 62 47.5)"/>
  </g>
</svg>
